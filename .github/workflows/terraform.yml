name: Terraform & Ansible CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: "Deploy Infrastructure and Apps"
    runs-on: ubuntu-latest

    env:
      # Node.js 24 사용 강제 (경고 해결)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Terraform 변수
      TF_VAR_cf_api_token: ${{ secrets.CF_API_TOKEN }}
      TF_VAR_cf_account_id: ${{ secrets.CF_ACCOUNT_ID }}
      TF_VAR_cf_zone_id: ${{ secrets.CF_ZONE_ID }}
      # AWS 인증
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "ap-northeast-2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        working-directory: ./terraform

      - name: Set up SSH Key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > chilseongpa_keypair.pem
          chmod 600 chilseongpa_keypair.pem
        # 루트 디렉토리에 저장 (Terraform에서 ../ 로 참조하므로)

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Run Ansible Playbook
        run: |
          # 인벤토리가 생성될 때까지 잠시 대기 (Terraform 완료 후 파일 생성 확인)
          sleep 10
          ansible-playbook -i inventory.ini deploy-tunnel.yml --extra-vars "ansible_ssh_common_args='-o StrictHostKeyChecking=no'"
        working-directory: ./ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
