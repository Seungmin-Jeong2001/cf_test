name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    name: "Terraform Plan & Apply"
    runs-on: ubuntu-latest

    # Terraform 변수로 매핑할 환경 변수 설정
    env:
      TF_VAR_cf_api_token: ${{ secrets.CF_API_TOKEN }}
      TF_VAR_cf_account_id: ${{ secrets.CF_ACCOUNT_ID }}
      TF_VAR_cf_zone_id: ${{ secrets.CF_ZONE_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "ap-northeast-2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0" # 프로젝트의 버전에 맞춰 수정 가능

      - name: Terraform Format
        run: terraform fmt -check
        working-directory: ./terraform

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan -input=false
        working-directory: ./terraform

      # 실제 적용을 원하신다면 아래 단계를 주석 해제하세요 (main 브랜치 푸시 시에만 실행 추천)
