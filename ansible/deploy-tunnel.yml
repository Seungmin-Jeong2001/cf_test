---
- name: Deploy Web & Cloudflare Tunnel on Ubuntu 24.04 (AWS & GCP)
  hosts: all
  become: yes
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

  tasks:
    # 1. Nginx 설치 (에러 방지를 위해 shell 사용)
    - name: Update apt and Install Nginx
      ansible.builtin.shell: "apt-get update && apt-get install -y nginx"
      args:
        creates: /usr/sbin/nginx

    # 2. 서버별 웹 페이지 구분
    - name: Set Web Content (AWS)
      ansible.builtin.copy:
        content: "<h1>AWS (Sub) - Ubuntu 24.04 - /2</h1>"
        dest: /var/www/html/index.html
        mode: '0644'
      when: "'aws' in group_names"

    - name: Set Web Content (GCP)
      ansible.builtin.copy:
        content: "<h1>GCP (Main) - Ubuntu 24.04 - /1</h1>"
        dest: /var/www/html/index.html
        mode: '0644'
      when: "'gcp' in group_names"

    - name: Ensure Nginx is Running
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: yes

    # 3. Cloudflared 설치 및 서비스 등록
    - name: Download Cloudflared (amd64 DEB)
      ansible.builtin.get_url:
        url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        dest: /tmp/cloudflared.deb

    - name: Install Cloudflared
      ansible.builtin.shell: "dpkg -i /tmp/cloudflared.deb || apt-get install -f -y"

    - name: Uninstall existing Cloudflared service
      ansible.builtin.shell: "cloudflared service uninstall"
      ignore_errors: yes

    - name: Install and Start Cloudflared Service
      ansible.builtin.shell: "cloudflared service install {{ tunnel_token }}"
      notify: Restart Cloudflared

  handlers:
    - name: Restart Cloudflared
      ansible.builtin.systemd:
        name: cloudflared
        state: restarted